<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ليلى الخاص</title>
    <!-- استدعاء خط لطيف للموقع -->
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- مكتبة Canvas Confetti للمؤثرات الاحتفالية -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --pink-dark: #ff7495;
            --pink-light: #ffb7c5;
            --pink-bg: #fff0f3;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--pink-bg);
            background-image: radial-gradient(var(--pink-light) 1px, transparent 0);
            background-size: 24px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .card {
            background: var(--white);
            border: 4px solid var(--pink-light);
            border-radius: 30px;
            padding: 30px 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(255, 116, 149, 0.15);
            position: relative;
        }

        /* شخصية كرتونية لطيفة مصممة بالـ CSS */
        .character-box {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            position: relative;
        }

        .bunny {
            width: 90px;
            height: 90px;
            background: var(--white);
            border: 4px solid var(--pink-dark);
            border-radius: 50% 50% 45% 45%;
            position: absolute;
            bottom: 0;
            left: 15px;
            animation: float 3s ease-in-out infinite;
        }

        .bunny::before, .bunny::after {
            content: '';
            position: absolute;
            top: -35px;
            width: 24px;
            height: 50px;
            background: var(--white);
            border: 4px solid var(--pink-dark);
            border-radius: 50% 50% 10% 10%;
        }

        .bunny::before { left: 10px; transform: rotate(-10px); }
        .bunny::after { right: 10px; transform: rotate(10px); }

        .eyes {
            position: absolute;
            top: 40px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
        }

        .eye {
            width: 10px;
            height: 10px;
            background: #333;
            border-radius: 50%;
        }

        .blush {
            position: absolute;
            top: 50px;
            width: 14px;
            height: 8px;
            background: var(--pink-light);
            border-radius: 50%;
        }
        .blush.left { left: 10px; }
        .blush.right { right: 10px; }

        .mouth {
            width: 12px;
            height: 8px;
            border: 3px solid #333;
            border-top: none;
            border-radius: 0 0 10px 10px;
            position: absolute;
            top: 48px;
            left: 35px;
            transition: all 0.2s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        /* نصوص وأزرار مرنة للموبايل */
        h1 {
            color: var(--pink-dark);
            font-size: 1.5rem;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: fadeIn 0.4s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            background: var(--white);
            border: 3px solid var(--pink-dark);
            color: var(--pink-dark);
            padding: 12px 28px;
            font-size: 1.2rem;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 var(--pink-dark);
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 var(--pink-dark);
        }

        button.primary {
            background: var(--pink-dark);
            color: var(--white);
            box-shadow: 0 4px 0 #d6496b;
        }

        button.primary:active {
            box-shadow: 0 0px 0 #d6496b;
        }

        /* قلوب متطايرة */
        .heart-particle {
            position: fixed;
            color: var(--pink-dark);
            font-size: 24px;
            pointer-events: none;
            animation: flyUp 1.5s linear forwards;
            z-index: 999;
        }

        @keyframes flyUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
        }

        .kiss-mark {
            position: absolute;
            font-size: 40px;
            top: 20%;
            left: 40%;
            opacity: 0;
            pointer-events: none;
        }

        .kiss-active {
            animation: kissAnim 1s ease-out forwards;
        }

        @keyframes kissAnim {
            0% { opacity: 0; transform: scale(0.5) translateY(0); }
            50% { opacity: 1; transform: scale(1.3) translateY(-20px); }
            100% { opacity: 0; transform: scale(1) translateY(-40px); }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- الشخصية الكرتونية اللطيفة -->
        <div class="character-box">
            <div class="bunny" id="bunnyChar">
                <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                <div class="blush left"></div><div class="blush right"></div>
                <div class="mouth" id="bunnyMouth"></div>
            </div>
            <div class="kiss-mark" id="kissMark">💋</div>
        </div>

        <!-- الخطوة 1: السؤال الأول -->
        <div class="step active" id="step1">
            <h1>هلو ليلى، شلونج؟ زينة؟</h1>
            <div class="btn-group">
                <button class="primary" onclick="answerTrue()">إي زينة</button>
                <button onclick="answerFalse()">لا</button>
            </div>
        </div>

        <!-- الخطوة 2: بعد الجواب -->
        <div class="step" id="step2">
            <h1 id="replyText"></h1>
            <div class="btn-group">
                <button class="primary" onclick="triggerKiss()">جيت 😘</button>
            </div>
        </div>

        <!-- الخطوة 3: سؤال الحب -->
        <div class="step" id="step3">
            <h1>تحبيني؟ 🥺</h1>
            <div class="btn-group">
                <button class="primary" onclick="triggerLove()">إي! ❤️</button>
            </div>
        </div>

        <!-- الخطوة 4: النهاية السعيدة -->
        <div class="step" id="step4">
            <h1 style="font-size: 1.8rem;">فدوة لله! وأنا هماتين أموت عليج يا أحلى ليلى بالدنيا! 🌸✨</h1>
        </div>
    </div>

    <script>
        // استخدام ملف صوتي مدمج من نظام الويب للتوافق الفوري بدون ملف خارجي
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playKissSound() {
            // توليد صوت يشبه القبلة إلكترونياً لضمان عمله مباشرة على أي جهاز
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function changeStep(currentId, nextId) {
            document.getElementById(currentId).classList.remove('active');
            document.getElementById(nextId).classList.add('active');
        }

        function answerTrue() {
            document.getElementById('bunnyMouth').style.borderRadius = "0 0 15px 15px"; // ابتسامة عريضة
            document.getElementById('replyText').innerText = "دووومج يارب زينة ومبسوطة! دايماً ضحكتج الحلوة تنور الدنيا 💖";
            changeStep('step1', 'step2');
        }

        function answerFalse() {
            document.getElementById('bunnyMouth').style.borderTop = "3px solid #333"; // فم حزين
            document.getElementById('bunnyMouth').style.borderBottom = "none";
            document.getElementById('replyText').innerText = "يا عمري سلامة قلبج.. هسة الكسرة والزعل كله يروح! جيتج ومحضرلج مفاجأة 🥺";
            changeStep('step1', 'step2');
        }

        function triggerKiss() {
            playKissSound();
            
            // تفعيل حركة البوسة الكرتونية
            const kiss = document.getElementById('kissMark');
            kiss.classList.add('kiss-active');
            
            // إعادة شكل الفم طبيعي ولطيف
            document.getElementById('bunnyMouth').style.borderTop = "none";
            document.getElementById('bunnyMouth').style.borderBottom = "3px solid #333";
