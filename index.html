<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ليلى اللطيف</title>
    <style>
        :root {
            --pink-dark: #ff69b4;
            --pink-light: #ffb6c1;
            --pink-bg: #fff0f5;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--pink-bg);
            background-image: radial-gradient(var(--pink-light) 10%, transparent 11%);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .card {
            background: var(--white);
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.4);
            border: 4px solid var(--pink-light);
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            min-height: 380px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* شاشات الأسئلة المتحركة */
        .step {
            display: none;
            width: 100%;
            animation: scaleUp 0.4s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .step.active {
            display: block;
        }

        @keyframes scaleUp {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        /* الشخصية الكرتونية */
        .character-box {
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
            position: relative;
        }

        .bounce {
            animation: bounceAnim 2s infinite ease-in-out;
        }

        @keyframes bounceAnim {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h1, h2 {
            color: var(--pink-dark);
            font-size: 1.6rem;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        p {
            color: #555;
            font-size: 1.2rem;
            margin-bottom: 25px;
        }

        /* الأزرار */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
            margin-top: 10px;
        }

        .btn {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            outline: none;
            min-width: 110px;
        }

        .btn-primary {
            background-color: var(--pink-dark);
            color: var(--white);
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.3);
        }

        .btn-primary:active { transform: scale(0.95); }

        .btn-secondary {
            background-color: var(--white);
            color: var(--pink-dark);
            border: 3px solid var(--pink-light);
        }

        .btn-secondary:active { transform: scale(0.95); }

        /* حركة البوسة */
        .kiss-emoji {
            font-size: 3.5rem;
            display: inline-block;
            animation: kissAnim 1.2s infinite ease-in-out;
        }

        @keyframes kissAnim {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3) rotate(-10deg); }
        }

        /* تأثير القلوب الطائرة */
        .heart {
            position: fixed;
            color: var(--pink-dark);
            font-size: 24px;
            pointer-events: none;
            z-index: 999;
            animation: flyUp 2s linear forwards;
        }

        @keyframes flyUp {
            0% { transform: translateY(100vh) translateX(0) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) translateX(var(--x-move)) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card">
        
        <!-- الخطوة 1: السؤال الأول -->
        <div class="step active" id="step1">
            <div class="character-box bounce">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <ellipse cx="35" cy="25" rx="8" ry="20" fill="#ffb6c1" stroke="#ff69b4" stroke-width="3"/>
                    <ellipse cx="35" cy="25" rx="4" ry="12" fill="#fff"/>
                    <ellipse cx="65" cy="25" rx="8" ry="20" fill="#ffb6c1" stroke="#ff69b4" stroke-width="3"/>
                    <ellipse cx="65" cy="25" rx="4" ry="12" fill="#fff"/>
                    <ellipse cx="50" cy="65" rx="30" ry="25" fill="#fff" stroke="#ff69b4" stroke-width="3"/>
                    <circle cx="40" cy="62" r="3" fill="#000"/>
                    <circle cx="60" cy="62" r="3" fill="#000"/>
                    <circle cx="32" cy="68" r="4" fill="#ffb6c1" opacity="0.7"/>
                    <circle cx="68" cy="68" r="4" fill="#ffb6c1" opacity="0.7"/>
                    <path d="M 46 68 Q 50 72 54 68" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </div>
            <h1>هلو ليلى، شلونج؟ زينة؟</h1>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="nextStep(1, 'yes')">إي زينة</button>
                <button class="btn btn-secondary" onclick="nextStep(1, 'no')">لا</button>
            </div>
        </div>

        <!-- الخطوة 2: نتيجة السؤال الأول -->
        <div class="step" id="step2">
            <div class="character-box">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <ellipse cx="35" cy="25" rx="8" ry="20" fill="#ffb6c1" stroke="#ff69b4" stroke-width="3"/>
                    <ellipse cx="65" cy="25" rx="8" ry="20" fill="#ffb6c1" stroke="#ff69b4" stroke-width="3"/>
                    <ellipse cx="50" cy="65" rx="30" ry="25" fill="#fff" stroke="#ff69b4" stroke-width="3"/>
                    <circle cx="40" cy="62" r="3" fill="#000"/>
                    <circle cx="60" cy="62" r="3" fill="#000"/>
                    <circle cx="32" cy="68" r="5" fill="#ffb6c1"/>
                    <circle cx="68" cy="68" r="5" fill="#ffb6c1"/>
                    <path d="M 43 70 Q 50 64 57 70" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </div>
            <h2 id="response-text1">رسالة متغيرة...</h2>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="playKiss()">جيت 😘</button>
            </div>
        </div>

        <!-- الخطوة 3: حركة البوسة والصوت -->
        <div class="step" id="step3">
            <div class="kiss-emoji">😘💋</div>
            <h2>اموووواه! فدوة لهالضحكة</h2>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="goToStep(4)">التالي</button>
            </div>
        </div>

        <!-- الخطوة 4: سؤال تحبيني؟ -->
        <div class="step" id="step4">
            <div class="character-box bounce">
                <svg viewBox="0 0 100 100" width="100%" height="100%">
                    <ellipse cx="35" cy="25" rx="8" ry="20" fill="#ffb6c1" stroke="#ff69b4" stroke-width="3"/>
                    <ellipse cx="65" cy="25" rx="8" ry="20" fill="#ffb6c1" stroke="#ff69b4" stroke-width="3"/>
                    <ellipse cx="50" cy="65" rx="30" ry="25" fill="#fff" stroke="#ff69b4" stroke-width="3"/>
                    <path d="M 38 60 Q 40 56 42 60 Q 44 64 40 66 Q 36 64 38 60" fill="#ff69b4"/>
                    <path d="M 58 60 Q 60 56 62 60 Q 64 64 60 66 Q 56 64 58 60" fill="#ff69b4"/>
                    <circle cx="32" cy="68" r="4" fill="#ffb6c1" opacity="0.7"/>
                    <circle cx="68" cy="68" r="4" fill="#ffb6c1" opacity="0.7"/>
                    <path d="M 45 70 Q 50 75 55 70" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </div>
            <h1>تحبيني؟ 🥺👉👈</h1>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="celebrate()">إي طبعاً! ❤️</button>
            </div>
        </div>

        <!-- الخطوة 5: النهاية السعيدة والمؤثرات -->
        <div class="step" id="step5">
            <div style="font-size: 3.5rem; margin-bottom: 15px;">💖🌸</div>
            <h2>وأنا أحبج هواي يا أحلى ليلى بالدنيا! 🥰</h2>
            <p>موقعج الخاص ممتلئ بالحب والبهجة اليوم!</p>
        </div>

    </div>

    <script>
        // دالة التنقل بين الخطوات
        function goToStep(stepNumber) {
            document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
            document.getElementById('step' + stepNumber).classList.add('active');
        }

        // معالجة إجابة السؤال الأول
        function nextStep(currentStep, answer) {
            const responseText = document.getElementById('response-text1');
            if (answer === 'yes') {
                responseText.innerText = "دومج زينة وعال العال يا رب! تفضلي هديتج:";
            } else {
                responseText.innerText = "يا عمري، سلامة قلبج! هسة تصيرين زينة مع هالبوسة:";
            }
            goToStep(2);
        }

        // تشغيل صوت البوسة والانتقال
        function playKiss() {
            // توليد صوت البوسة برمجياً دون الحاجة لملف خارجي يسبب التعليق
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
