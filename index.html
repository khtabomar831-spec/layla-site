<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ليلى الخاص الفخم</title>
    <!-- استدعاء مكتبة الألعاب النارية للأجواء الاحتفالية الفضائية -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --pink-bg: #ffe4e1;
            --pink-card: #ffb6c1;
            --pink-btn: #ff69b4;
            --white: #ffffff;
            --dark-gray: #4a4a4a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--pink-bg);
            background-image: radial-gradient(var(--pink-card) 20%, transparent 20%),
                              radial-gradient(var(--pink-card) 20%, transparent 20%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            overflow: hidden;
            position: relative;
        }

        /* حاوية التصميم ثلاثية الأبعاد البارزة */
        .app-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(255, 105, 180, 0.3),
                        inset 0 -8px 0px rgba(255, 182, 193, 0.5);
            border: 5px solid var(--white);
            width: 100%;
            max-width: 375px;
            height: 620px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            padding: 30px 20px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .screen.active {
            display: flex;
            animation: fadeInScreen 0.4s forwards ease-out;
        }

        @keyframes fadeInScreen {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* نمط المراسلة للمحادثة التفاعلية */
        .chat-area {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .chat-bubble-container {
            background: linear-gradient(135deg, #fff5f7, #ffffff);
            border: 3px solid var(--pink-card);
            border-radius: 25px;
            padding: 20px;
            margin-top: auto;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(255,182,193,0.2);
            position: relative;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .kitty-avatar {
            width: 110px;
            height: 110px;
            margin: 0 auto 15px;
        }

        .chat-text {
            color: var(--dark-gray);
            font-size: 1.25rem;
            font-weight: bold;
            line-height: 1.6;
        }

        /* تصميم الأزرار ثلاثية الأبعاد الفخمة */
        .action-btn {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: var(--white);
            font-size: 1.3rem;
            font-weight: bold;
            padding: 14px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0px #c71585, 0 10px 20px rgba(255, 20, 147, 0.3);
            transition: all 0.15s ease;
            margin-bottom: 20px;
            width: 85%;
            align-self: center;
        }
        .action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #c71585, 0 4px 10px rgba(255, 20, 147, 0.3);
        }

        /* واجهة شاشة الفضاء والمجرة النهائية */
        .space-bg {
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%) !important;
        }

        .stars-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .final-window {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 192, 203, 0.3);
            border-radius: 30px;
            padding: 30px 20px;
            width: 90%;
            z-index: 5;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.2);
            animation: floatingEffect 3s infinite ease-in-out;
        }

        @keyframes floatingEffect {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .final-msg {
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffffff;
            line-height: 1.8;
            text-shadow: 0 0 10px rgba(255,105,180,0.8);
        }

        .dancing-scene {
            display: flex;
            gap: 30px;
            margin-top: 25px;
            z-index: 5;
        }

        .dancer {
            width: 80px;
            height: 80px;
        }
        .dance-left { animation: danceLeft 0.5s infinite alternate ease-in-out; }
        .dance-right { animation: danceRight 0.5s infinite alternate ease-in-out; }

        @keyframes danceLeft {
            0% { transform: scale(1) rotate(-12deg) translateY(0); }
            100% { transform: scale(1.05) rotate(12deg) translateY(-8px); }
        }
        @keyframes danceRight {
            0% { transform: scale(1.05) rotate(12deg) translateY(-8px); }
            100% { transform: scale(1) rotate(-12deg) translateY(0); }
        }
    </style>
</head>
<body>

    <div class="app-container" id="appBox">
        
        <!-- الشاشة: المحادثة والتنقلات التفاعلية للسيناريو الكامل (تبدأ مباشرة) -->
        <div class="screen active" id="screen-chat">
            <div class="chat-area">
                <!-- يمكنك إكمال بقية عناصر المحادثة هنا -->
            </div>
        </div>

    </div>

</body>
</html>
